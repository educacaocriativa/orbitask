name: 🚀 Orbitask — Deploy to App Runner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:        us-east-1
  AWS_REGION_RUNNER: us-east-2
  ECR_REPOSITORY:    540280374180.dkr.ecr.us-east-1.amazonaws.com/orbitask-backend
  APP_RUNNER_ARN:    arn:aws:apprunner:us-east-2:540280374180:service/orbitask/b30957f47517415593b31e84b534eee5
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Quality Checks ────────────────────────────────────
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci && npx prisma generate

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Type-check backend
        run: cd backend && npx tsc --noEmit || true

      - name: Type-check frontend
        run: cd frontend && npx tsc --noEmit || true

      - name: Lint frontend
        run: cd frontend && npm run lint || true

  # ── 2. Build & push to ECR ───────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Deploy to App Runner ──────────────────────────────
  deploy:
    name: Deploy to App Runner
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    us-east-2

    steps:
      - name: Check App Runner service status
        run: |
          echo "🔍 Status atual do serviço:"
          aws apprunner describe-service \
            --service-arn "${{ env.APP_RUNNER_ARN }}" \
            --query 'Service.{Status:Status,URL:ServiceUrl}' \
            --output table 2>&1 || echo "⚠️ Não foi possível consultar o serviço"

      - name: Trigger App Runner deployment
        run: |
          echo "🚀 Disparando deploy..."
          OUTPUT=$(aws apprunner start-deployment \
            --service-arn "${{ env.APP_RUNNER_ARN }}" \
            2>&1)
          EXIT=$?
          echo "$OUTPUT"
          if [ $EXIT -ne 0 ]; then
            echo "$OUTPUT" | grep -qi "operation_in_progress\|already" \
              && echo "ℹ️ Deploy já em andamento — sem ação necessária" && exit 0
            echo "❌ Falha ao disparar deploy. Verifique o console AWS App Runner (us-east-2)."
            exit 1
          fi
          echo "✅ Deploy iniciado em $(date)"

name: 🚀 Orbitask — Build & Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:      us-east-1
  APP_RUNNER_REGION: us-east-2
  ECR_REPOSITORY:  540280374180.dkr.ecr.us-east-1.amazonaws.com/orbitask-backend

jobs:
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trigger App Runner deployment
        env:
          APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          if [ -z "$APP_RUNNER_SERVICE_ARN" ]; then
            echo "::error::Missing GitHub secret APP_RUNNER_SERVICE_ARN"
            exit 1
          fi

          aws apprunner start-deployment \
            --region "${{ env.APP_RUNNER_REGION }}" \
            --service-arn "$APP_RUNNER_SERVICE_ARN"
